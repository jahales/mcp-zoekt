# Zoekt Infrastructure - Code Search Indexing (continuous sync)
# See README.md for setup instructions
#
# Required environment variables:
#   GITHUB_ORG - GitHub organization to index (e.g., "my-company")

services:
  # Sync service - mirrors and indexes repositories continuously
  zoekt-sync:
    image: zoekt:local
    container_name: zoekt-sync
    environment:
      - GITHUB_ORG=${GITHUB_ORG:?GITHUB_ORG is required}
      - SYNC_INTERVAL=${SYNC_INTERVAL:-3600}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        TOKEN=$$(cat /config/github-token.txt)
        git config --global url."https://$$TOKEN@github.com/".insteadOf "https://github.com/"
        while true; do
          echo "[$$(date -u '+%Y-%m-%dT%H:%M:%SZ')] Sync cycle starting for $${GITHUB_ORG}"
          echo "[$$(date -u '+%Y-%m-%dT%H:%M:%SZ')] Mirroring $${GITHUB_ORG}..."
          zoekt-mirror-github -dest /data/repos -org $${GITHUB_ORG} -token /config/github-token.txt -no_archived || true
          echo "[$$(date -u '+%Y-%m-%dT%H:%M:%SZ')] Indexing repositories..."
          for repo in /data/repos/github.com/$${GITHUB_ORG}/*.git; do
            if [ -d "$$repo" ]; then
              echo "Indexing $$repo..."
              zoekt-git-index -index /data/index "$$repo" || echo "Failed to index $$repo"
            fi
          done
          echo "[$$(date -u '+%Y-%m-%dT%H:%M:%SZ')] Sync cycle complete. Sleeping $${SYNC_INTERVAL}s..."
          sleep $${SYNC_INTERVAL}
        done
    volumes:
      - zoekt-data:/data
      - ./config:/config:ro
    restart: unless-stopped
    networks:
      - zoekt

  zoekt-webserver:
    image: zoekt:local
    container_name: zoekt-webserver
    command: zoekt-webserver -index /data/index -rpc
    ports:
      - "6070:6070"
    volumes:
      - zoekt-data:/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6070/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - zoekt

volumes:
  zoekt-data:
    driver: local

networks:
  zoekt:
    driver: bridge
