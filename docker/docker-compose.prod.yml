# Zoekt Infrastructure - Production Deployment
# Daily index updates via cron (see update-index.sh)
# Ports exposed: 6070 (Zoekt API), 3001 (MCP HTTP API)
# See README.md for setup instructions
#
# Required environment variables (set in docker/.env):
#   GITHUB_ORGS - comma-separated GitHub orgs to index (e.g., "snap-one,control4")
#   GITHUB_ORG  - single-org fallback, used only when GITHUB_ORGS is unset

services:
  # Init container (always runs) - ensures required directories exist in the volume
  # This allows zoekt-webserver to mount /data read-only while still starting cleanly
  # on first run (empty volume).
  zoekt-init:
    image: zoekt:local
    container_name: zoekt-init
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        mkdir -p /data/index /data/repos
    volumes:
      - zoekt-data:/data
    restart: "no"
    networks:
      - zoekt

  # GitHub mirror - clones/updates repos from GitHub
  # Run on demand, or nightly via host cron (see update-index.sh / deploy.sh)
  zoekt-mirror:
    image: zoekt:local
    container_name: zoekt-mirror
    environment:
      # NOTE: Do not use ${VAR:?} here (Compose interpolates even when profile is disabled)
      # GITHUB_ORGS (comma-separated) is preferred; GITHUB_ORG is the single-org fallback.
      - GITHUB_ORGS=${GITHUB_ORGS:-}
      - GITHUB_ORG=${GITHUB_ORG:-}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ORGS="$${GITHUB_ORGS:-$${GITHUB_ORG}}"
        if [ -z "$${ORGS}" ]; then
          echo "ERROR: set GITHUB_ORGS (comma-separated) or GITHUB_ORG for the 'mirror' profile" >&2
          exit 1
        fi
        TOKEN=$$(cat /config/github-token.txt)
        git config --global url."https://$$TOKEN@github.com/".insteadOf "https://github.com/"
        echo "Starting mirror at $$(date)"
        # Split on commas without a pipe-to-while (a subshell would swallow the
        # exit status). Track failures so a bad token / network error makes the
        # container exit non-zero instead of silently mirroring nothing.
        rc=0
        OLDIFS=$$IFS; IFS=','
        for org in $${ORGS}; do
          IFS=$$OLDIFS
          org=$$(echo "$$org" | tr -d '[:space:]')
          if [ -n "$$org" ]; then
            echo "Mirroring org: $$org"
            # zoekt-mirror-github only CLONES repos that are missing; it does not
            # update existing clones. Clone new repos first...
            if ! zoekt-mirror-github -dest /data/repos -org "$$org" -token /config/github-token.txt -no_archived; then
              echo "ERROR: mirror failed for org $$org (check token/network)" >&2
              rc=1
              IFS=','
              continue
            fi
            # ...then fetch updates into every existing bare clone so re-indexing
            # sees new commits (auth via the insteadOf token config above).
            echo "Fetching updates for existing $$org clones..."
            for repo in /data/repos/github.com/$$org/*.git; do
              [ -d "$$repo" ] || continue
              git --git-dir="$$repo" fetch --prune --quiet origin "+refs/heads/*:refs/heads/*" \
                || echo "WARN: fetch failed for $$repo" >&2
            done
          fi
          IFS=','
        done
        IFS=$$OLDIFS
        if [ "$$rc" -ne 0 ]; then
          echo "Mirror finished WITH ERRORS at $$(date)" >&2
        else
          echo "Mirror complete at $$(date)"
        fi
        exit $$rc
    volumes:
      - zoekt-data:/data
      - ./config:/config:ro
    restart: "no"
    profiles:
      - mirror
    networks:
      - zoekt

  # Indexer - indexes cloned repos after mirror completes
  zoekt-indexer:
    image: zoekt:local
    container_name: zoekt-indexer
    environment:
      # NOTE: Do not use ${VAR:?} here (Compose interpolates even when profile is disabled)
      # GITHUB_ORGS (comma-separated) is preferred; GITHUB_ORG is the single-org fallback.
      - GITHUB_ORGS=${GITHUB_ORGS:-}
      - GITHUB_ORG=${GITHUB_ORG:-}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ORGS="$${GITHUB_ORGS:-$${GITHUB_ORG}}"
        if [ -z "$${ORGS}" ]; then
          echo "ERROR: set GITHUB_ORGS (comma-separated) or GITHUB_ORG for the 'index' profile" >&2
          exit 1
        fi
        echo "Starting indexing at $$(date)"
        echo "$${ORGS}" | tr ',' '\n' | while IFS= read -r org; do
          org=$$(echo "$$org" | tr -d '[:space:]')
          [ -z "$$org" ] && continue
          echo "Indexing org: $$org"
          for repo in /data/repos/github.com/$$org/*.git; do
            if [ -d "$$repo" ]; then
              echo "Indexing $$repo..."
              zoekt-git-index -index /data/index "$$repo" || echo "Failed to index $$repo"
            fi
          done
        done
        echo "Indexing complete at $$(date)"
    volumes:
      - zoekt-data:/data
    restart: "no"
    profiles:
      - index
    networks:
      - zoekt

  # Webserver - serves search API (always running)
  zoekt-webserver:
    image: zoekt:local
    container_name: zoekt-webserver
    command: zoekt-webserver -index /data/index -rpc -listen :6070
    ports:
      - "6070:6070"  # HTTP API - accessible from dev machines
    volumes:
      - zoekt-data:/data:ro
    depends_on:
      zoekt-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:6070/ > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - zoekt

  # MCP Server - exposes Zoekt via MCP protocol (HTTP transport for remote access)
  zoekt-mcp:
    image: zoekt-mcp:local
    container_name: zoekt-mcp
    environment:
      - ZOEKT_URL=http://zoekt-webserver:6070
      - MCP_TRANSPORT=http
      - MCP_PORT=3001
      - MCP_HOST=0.0.0.0
      - LOG_LEVEL=info
    ports:
      - "3001:3001"  # MCP HTTP API - accessible from dev machines
    depends_on:
      zoekt-webserver:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - zoekt

volumes:
  zoekt-data:
    driver: local

networks:
  zoekt:
    driver: bridge
